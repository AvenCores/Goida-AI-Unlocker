name: Build Python

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onefile
          --noconsole
          --icon=icon.ico
          --name="Goida_AI_Unlocker_Windows"
          --version-file=version.txt
          --add-data "icon.ico;."
          --add-data "app_info.json;."
          --add-data "icons;icons"
          --add-data "app;app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-windows
          path: source/dist/Goida_AI_Unlocker_Windows.exe
          if-no-files-found: error

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onefile
          --noconsole
          --icon=icon.ico
          --name="Goida_AI_Unlocker_Windows_ARM64"
          --version-file=version.txt
          --add-data "icon.ico;."
          --add-data "app_info.json;."
          --add-data "icons;icons"
          --add-data "app;app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-windows-arm64
          path: source/dist/Goida_AI_Unlocker_Windows_ARM64.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onefile
          --noconsole
          --icon=icon.ico
          --name="Goida_AI_Unlocker_Linux"
          --add-data "icon.ico:."
          --add-data "app_info.json:."
          --add-data "icons:icons"
          --add-data "app:app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-linux
          path: source/dist/Goida_AI_Unlocker_Linux
          if-no-files-found: error

  build-macos-x86_64:
    name: Build macOS (Intel)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          architecture: x64

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onedir
          --windowed
          --target-arch x86_64
          --icon=icon.icns
          --name="Goida_AI_Unlocker_macOS_x86_64"
          --add-data "icon.icns:."
          --add-data "icon.ico:."
          --add-data "app_info.json:."
          --add-data "icons:icons"
          --add-data "app:app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-macos-x86_64
          path: source/dist/Goida_AI_Unlocker_macOS_x86_64.app
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          architecture: arm64

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onedir
          --windowed
          --icon=icon.icns
          --name="Goida_AI_Unlocker_macOS_arm64"
          --add-data "icon.icns:."
          --add-data "icon.ico:."
          --add-data "app_info.json:."
          --add-data "icons:icons"
          --add-data "app:app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-macos-arm64
          path: source/dist/Goida_AI_Unlocker_macOS_arm64.app
          if-no-files-found: error

