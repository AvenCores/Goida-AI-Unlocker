name: Build Python

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onefile
          --noconsole
          --icon=icon.ico
          --name="Goida_AI_Unlocker_Windows"
          --version-file=version.txt
          --add-data "icon.ico;."
          --add-data "app_info.json;."
          --add-data "icons;icons"
          --add-data "app;app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-windows
          path: source/dist/Goida_AI_Unlocker_Windows.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: source

      - name: Build with PyInstaller
        run: >
          pyinstaller main.py
          --onefile
          --noconsole
          --icon=icon.ico
          --name="Goida_AI_Unlocker_Linux"
          --add-data "icon.ico:."
          --add-data "app_info.json:."
          --add-data "icons:icons"
          --add-data "app:app"
        working-directory: source

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-linux
          path: source/dist/Goida_AI_Unlocker_Linux
          if-no-files-found: error
